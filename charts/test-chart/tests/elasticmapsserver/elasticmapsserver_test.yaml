suite: Test elasticmapsserver template
templates:
  - template.yaml

tests:
  - it: should create basic elasticmapsserver correctly
    values:
      - elasticmapsserver_values.yaml
    asserts:
      - equal:
          path: kind
          value: ElasticMapsServer
      - equal:
          path: apiVersion
          value: maps.k8s.elastic.co/v1alpha1
      - equal:
          path: metadata.name
          value: test-maps
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: spec.version
          value: "8.15.0"
      - equal:
          path: spec.count
          value: 1
      - equal:
          path: spec.elasticsearchRef.name
          value: test-es

  - it: should not render elasticmapsserver if disabled
    values:
      - elasticmapsserver_values.yaml
    set:
      elasticmapsservers.test-maps.disabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set labels correctly
    values:
      - elasticmapsserver_values.yaml
    set:
      elasticmapsservers.test-maps.labels:
        custom-label: test-value
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: test-value

  - it: should set annotations correctly
    values:
      - elasticmapsserver_values.yaml
    set:
      elasticmapsservers.test-maps.annotations:
        test-annotation: test-value
    asserts:
      - equal:
          path: metadata.annotations["test-annotation"]
          value: test-value

  - it: should render global placeholders in spec
    set:
      global:
        elastic:
          version: "8.15.0"
      elasticmapsservers:
        - name: test-maps
          namespace: test-namespace
          version: "{{global.elastic.version}}"
          count: 1
          elasticsearchRef:
            name: test-es
    asserts:
      - equal:
          path: spec.version
          value: "8.15.0"

  - it: should render global placeholders in annotations
    values:
      - elasticmapsserver_values.yaml
    set:
      global:
        env: production
      elasticmapsservers.test-maps.annotations:
        environment: "{{global.env}}"
    asserts:
      - equal:
          path: metadata.annotations["environment"]
          value: production
