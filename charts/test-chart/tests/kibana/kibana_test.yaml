suite: Test kibana template
templates:
  - template.yaml

tests:
  - it: should create basic kibana correctly
    values:
      - kibana_values.yaml
    asserts:
      - equal:
          path: kind
          value: Kibana
      - equal:
          path: apiVersion
          value: kibana.k8s.elastic.co/v1
      - equal:
          path: metadata.name
          value: test-kibana
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: spec.version
          value: "8.15.0"
      - equal:
          path: spec.count
          value: 1
      - equal:
          path: spec.elasticsearchRef.name
          value: test-es

  - it: should not render kibana if disabled
    values:
      - kibana_values.yaml
    set:
      kibanas.test-kibana.disabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set labels correctly
    values:
      - kibana_values.yaml
    set:
      kibanas.test-kibana.labels:
        custom-label: test-value
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: test-value

  - it: should set annotations correctly
    values:
      - kibana_values.yaml
    set:
      kibanas.test-kibana.annotations:
        test-annotation: test-value
    asserts:
      - equal:
          path: metadata.annotations["test-annotation"]
          value: test-value

  - it: should render global placeholders in spec
    set:
      global:
        elastic:
          version: "8.15.0"
      kibanas:
        - name: test-kibana
          namespace: test-namespace
          version: "{{global.elastic.version}}"
          count: 1
          elasticsearchRef:
            name: test-es
    asserts:
      - equal:
          path: spec.version
          value: "8.15.0"

  - it: should render global placeholders in annotations
    values:
      - kibana_values.yaml
    set:
      global:
        env: production
      kibanas.test-kibana.annotations:
        environment: "{{global.env}}"
    asserts:
      - equal:
          path: metadata.annotations["environment"]
          value: production
